<!DOCTYPE html>
<html xmlns:th="http://thymeleaf.org" xmlns:layout="http://wwwultraq.net.nz/thymeleaf/layout" layout:decorate="layout">
<head>
	<meta charset="utf-8">
	<title>Saisir un article</title>
</head>	
<body>
	<div layout:fragment="content">
		<div class="col-md-4 col-xs-8">
			<div class="panel panel-primary">
				<div class="panel-heading">New contact</div>
				<div class="panel-body">
					<form th:action="@{/save}" method="post">
						<div class="form-group">
							<label class="control-label">Firstname : </label>
							<input type="text" class="form-control" name="firstname">
							<span th:errors="${contact.firstname}"></span>
						</div>
						<div class="form-group">
							<label class="control-label">Lastname : </label>
							<input type="text" class="form-control" name="lastname">
							<span th:errors="${contact.lastname}"></span>
						</div>
						<div class="form-group">
							<label class="control-label">Email : </label>
							<input type="text" class="form-control" name="email">
							<span th:errors="${contact.email}"></span>
						</div>
						<div class="form-group">
							<label class="control-label">Phone number : </label>
							<input type="text" class="form-control" name="phoneNumber">
							<span th:errors="${contact.phoneNumber}"></span>
						</div>
						<div class="form-group">
							<label class="control-label">Address : </label>
							<input type="text" class="form-control" name="address">
							<span th:errors="${contact.address}"></span>
						</div>
						<div class="form-group">
							<label class="control-label">Catégorie : </label>
							<select name="categoryId">
								<option th:each="c:${listCategory}" th:value="${c.id}" th:text="${c.name}"></option>
							</select>
						</div>
						<button type="submit" class="btn btn-primary">Save</button>
					</form>
				</div>
			</div>
		</div>
	</div>
</body>
</html>
